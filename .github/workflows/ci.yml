name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
  release:
    types: [created]

jobs:
  tests:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php: ['8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Run tests
        run: composer test

  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    needs: tests

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist

      - name: PHPStan
        run: composer phpstan

      - name: PHPMD
        run: composer phpmd

      - name: PHPCS
        run: composer phpcs

  packagist:
    name: Notify Packagist
    runs-on: ubuntu-latest
    needs: [tests, quality]
    if: github.event_name == 'release'

    steps:
      - name: Ping Packagist
        run: |
          curl -s -X POST "https://packagist.org/api/update-package?username=${{ secrets.PACKAGIST_USERNAME }}&apiToken=${{ secrets.PACKAGIST_API_TOKEN }}" \
            -d '{"repository":{"url":"${{ github.server_url }}/${{ github.repository }}"}}'
